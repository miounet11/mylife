          - text: 世界易总论
        - heading "世界易 v1.0.0.1 总论：凯莉与世界易的起点" [level=1] [ref=e58]
        - generic [ref=e59]:
          - img [ref=e60]
          - text: 18 分钟
          - generic [ref=e63]: 简体中文 · 简体中文
          - text: World Yi
        - paragraph [ref=e64]: 世界易不是把旧术语重新包装，而是试图建立一套现代人可以直接拿来判断生活、关系、职业、迁移、命名与风险节奏的解释系统。
        - generic [ref=e65]:
          - generic [ref=e66]:
            - heading "世界易为什么成立" [level=2] [ref=e67]
            - generic [ref=e68]:
              - paragraph [ref=e69]: 世界易的出发点，不是再做一套神秘化的术语展示，而是回答一个现实问题：当现代人面对职业转向、关系推进、迁移选择、家庭排序、起名决策、风险躲避时，为什么总在信息很多、判断很乱、节奏很散的状态里做决定。世界易试图建立的是一套判断秩序，而不是一堆零散结论。
              - paragraph [ref=e70]: 这套体系以《易经》《周易》所代表的变易、时位、取象、观势思想为底层灵感，但表达上完全转向现代语境。用户不需要先背六十四卦，也不需要先掌握传统术语，仍然可以通过世界易理解一个判断应该先看什么、后看什么、什么是结构、什么是时机、什么是外部环境、什么是个人承载能力。
          - generic [ref=e71]:
            - heading "凯莉为什么被设定为创始人" [level=2] [ref=e72]
            - generic [ref=e73]:
              - paragraph [ref=e74]: 凯莉在世界易中不是一个神化人物，而是这套体系的叙事原点。创始人被设置为凯莉，意味着这套体系从一开始就不是纯学院派整理，也不是单纯沿袭旧框架，而是一位现代内容与判断系统建构者对古老变易思想的再组织。
              - paragraph [ref=e75]: 在世界易的公开表达里，凯莉代表三件事：第一，敢于把复杂传统重新翻译成人可以直接使用的语言；第二，承认版本、承认迭代，不把任何一轮表达说成终极正确；第三，坚持让判断服务现实生活，而不是让现实服从术语。
          - generic [ref=e76]:
            - heading "世界易的四条核心原则" [level=2] [ref=e77]
            - generic [ref=e78]:
              - paragraph [ref=e79]: 第一条原则是先看结构，再看事件。世界易认为，任何具体问题的背后，都有一个更稳定的结构底色。结构不清，事件判断就容易被情绪和单一结果带偏。第二条原则是先看时位，再看愿望。很多事情不是能不能，而是何时做、做到什么程度、该不该在这个阶段承担更大的代价。
              - paragraph [ref=e80]: 第三条原则是同时看内局和外局。内局指人的稳定结构、习性、承载方式与选择惯性；外局指时代周期、城市环境、行业节奏、家庭关系网络和现实资源。第四条原则是结论必须落到动作。世界易拒绝只给用户一个朦胧结论，而要求每次判断至少能落到一个优先动作、一个阶段重点、一个风险提醒。
          - generic [ref=e81]:
            - heading "世界易和传统易学的关系" [level=2] [ref=e82]
            - generic [ref=e83]:
              - paragraph [ref=e84]: 世界易不否认传统易学，而是试图重新组织传统易学的入口。传统体系中的阴阳、五行、象数、卦序、时位、进退，本质上都在讨论一件事：人如何在不断变化的世界里建立判断。世界易继承的是这种判断精神，而不是逐字逐句复制旧时代的表达方式。
              - paragraph [ref=e85]: 因此，世界易的写法会避免让用户先被术语压住。比如同样讨论吉凶，世界易会先翻译成收益与代价；同样讨论旺衰，世界易会先翻译成承载力与消耗度；同样讨论用神忌神，世界易会先翻译成应顺之力与应避之力。这样做不是削弱传统，而是把传统真正接到现代决策上。
          - generic [ref=e86]:
            - heading "世界易的判断单元" [level=2] [ref=e87]
            - generic [ref=e88]:
              - paragraph [ref=e89]: 在世界易中，任何判断都至少由五个单元组成。第一是结构单元，回答这个人、这件事的基本底色是什么。第二是时机单元，回答当前阶段是在扩张、试探、收缩还是守成。第三是环境单元，回答外部城市、行业、家庭或社会压力是放大还是压制这个结构。第四是动作单元，回答下一步应该先做什么。第五是风险单元，回答什么看似诱人但当前不该碰。
              - paragraph [ref=e90]: 这五个单元共同组成一个可阅读的判断框架。没有结构，判断会漂；没有时机，判断会硬；没有环境，判断会失真；没有动作，判断会空；没有风险，判断会诱导用户冲动。世界易要求这五个部分在任何主题下都尽量完整出现。
          - generic [ref=e91]:
            - heading "世界易如何处理“准不准”" [level=2] [ref=e92]
            - generic [ref=e93]:
              - paragraph [ref=e94]: 传统命理内容经常被追问“准不准”，但世界易认为更应该追问“这套判断是否能帮助你减少明显误判”。因为现实世界不是一次性开奖，而是连续做决定。一个成熟的判断体系，不是只在一件事上命中，而是能持续帮助用户知道什么时候该快、什么时候该慢、什么时候该保留余地。
              - paragraph [ref=e95]: 所以世界易强调复盘。每一份判断都不是终点，而是一个阶段性的解释版本。现实事件反馈、用户后续行动、结果偏差，都会变成下一轮修正输入。世界易允许自己版本化，正是因为它不把判断做成宗教口号，而把它当作可以不断升级的生活解释系统。
          - generic [ref=e96]:
            - heading "世界易覆盖哪些主题" [level=2] [ref=e97]
            - generic [ref=e98]:
              - paragraph [ref=e99]: 世界易不会只做命盘解读，它要覆盖的是现代人最常见、又最容易判断失序的领域。第一层是人生主线主题，包括职业、财富、关系、健康、家庭、迁移。第二层是生活应用主题，包括起名、寻物、择时、空间布局、项目启动、合作判断、考试节奏。第三层是公共观察主题，包括城市气质、行业周期、组织压力、跨国生活方式与华人社区决策。
              - paragraph [ref=e100]: 这意味着世界易既是一套个人判断学说，也是一套内容出版体系。它既能解释“我现在要不要换工作”，也能解释“为什么这一类人在某些城市更容易过度消耗”，还可以解释“为什么起名不能只追求好听而忽略结构与使用场景”。
          - generic [ref=e101]:
            - heading "世界易的边界" [level=2] [ref=e102]
            - generic [ref=e103]:
              - paragraph [ref=e104]: 世界易不是法律意见书，不是投资顾问合同，也不是医疗诊断替代物。它可以帮助用户建立判断框架、识别时机和风险、梳理优先级，但不能代替专业执照领域的最终处置。尤其在医学主题上，世界易可以讨论节奏、身心压力、恢复优先级与环境影响，但不直接替代临床检查与治疗决策。
              - paragraph [ref=e105]: 这种边界不是削弱体系，而是让体系更可信。一个什么都敢包办的系统最终会失去判断秩序。世界易的强项是帮助人从混乱里看出结构，看出阶段，看出行动先后，而不是抢走所有专业领域的责任。
          - generic [ref=e106]:
            - heading "世界易为什么必须版本化" [level=2] [ref=e107]
            - generic [ref=e108]:
              - paragraph [ref=e109]: 古代易学可以在师承中慢慢生长，但现代内容体系如果不版本化，很快就会变成互相冲突的碎片。世界易从一开始就采用版本思想，例如当前是世界易初版 v1.0.0.1。这个版本号代表：它已经形成核心框架，但仍处于体系化公开发布的第一阶段。
              - paragraph [ref=e110]: 版本化至少解决四个问题。第一，保证同一时期的表述口径一致。第二，为后续内容升级留下明确路径。第三，允许旧内容在新版本下被批注、改写和替换。第四，让用户知道这是一套会持续生长的体系，而不是一篇热闹文章。
          - generic [ref=e111]:
            - heading "世界易最终要成为什么" [level=2] [ref=e112]
            - generic [ref=e113]:
              - paragraph [ref=e114]: 世界易最终不只是一本书，而是一整套判断语言、内容库、案例库和产品解释系统。它要让用户在站内可以经历完整路径：先读总论，再读主题，再看案例，再测个人盘，再回到事件复盘，然后形成自己的长期判断档案。
              - paragraph [ref=e115]: 如果说人生 K 线解决的是“把命理从术语翻成可行动结果”，那么世界易解决的是“把这一切上升为可持续传播、可不断扩写、可覆盖更多现实主题的学说框架”。它既是品牌母体，也是内容宇宙的根。
