# v5-D52 (2026-05-20): 502 根因 + 性能治理
# - nginx proxy_*_timeout 默认 60s，遇 LLM 长链路（CHAT_LLM_TIMEOUT_MS=240000）必 502。
# - upstream keepalive 复用 TCP，降下游 TIME_WAIT 与握手开销。
# - 流式与 LLM 路径关掉 proxy_buffering，避免首字节延迟与 502。
# - HTTP/2、SSL session cache、扩 gzip 类型、加 Cache-Control 给静态资源。
# - 限流：保护 admin / api 不被刷。
# 备份文件：lifekline.conf.bak.<timestamp>

upstream lifekline_upstream {
    # v5-D83 (2026-05-24): 横向 3 实例。least_conn 把请求送给最闲的那个，
    # 任一实例 fail 3 次会被踢出 10s（max_fails / fail_timeout）。
    # v5-D84 (2026-05-24): 加 3003 第 4 实例，吃满 6 核中的 4 个。
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=10s;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 75s;
}

# v5-D85 (2026-05-24): 公网 C 端独占 upstream（3001/3002/3003）。
# 把 admin / cron daemon 长任务彻底从公网热路径剥离，避免内容生产高 CPU 期挤掉用户。
upstream lifekline_web_upstream {
    least_conn;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=10s;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 75s;
}

# v5-D85 (2026-05-24): admin / cron 独占 upstream（3000）。
# daemon 内部回调和管理界面只打 3000，与公网用户物理隔离。
upstream lifekline_admin_upstream {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 16;
    keepalive_requests 200;
    keepalive_timeout 75s;
}

# 限流区
limit_req_zone $binary_remote_addr zone=lifekline_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=lifekline_admin:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=lifekline_conn:10m;

# v5-D85 (2026-05-24): 公开 SEO 页 micro-cache。
# CF bot 风暴 90%+ 流量打 knowledge/cases/tools/visual-assets/world-yi，
# 这些都是 SSG/无登录态页，靠 nginx 缓存挡掉重复 SSR 即可。
# 60s TTL 足够吸收 prefetch 风暴；stale-while-revalidate 保命。
proxy_cache_path /var/cache/nginx/lifekline levels=1:2 keys_zone=lifekline_cache:50m
                 max_size=2g inactive=10m use_temp_path=off;

# v5-D83 (2026-05-24): 内部 daemon 回调入口（127.0.0.1:8080）。
# daemon 的 *_RUN_URL 全部指向这里，由 upstream 的 least_conn 帮 daemon 做负载均衡。
# 不暴露公网，无 SSL，无限流，去掉 client_max_body_size 限制以兼容大 payload。
server {
    listen 127.0.0.1:8080;
    server_name _;
    access_log off;
    error_log /var/log/nginx/lifekline-internal-error.log warn;

    client_max_body_size 32m;
    client_body_timeout 300s;

    location / {
        proxy_pass http://lifekline_admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.life-kline.com life-kline.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.life-kline.com life-kline.com;

    ssl_certificate /etc/letsencrypt/live/www.life-kline.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.life-kline.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /var/log/nginx/lifekline-access.log;
    error_log /var/log/nginx/lifekline-error.log warn;

    # 上传体积限额
    client_max_body_size 12m;
    client_body_buffer_size 256k;
    client_header_timeout 30s;
    client_body_timeout 60s;
    send_timeout 60s;

    # 连接限额（防慢速 DoS）
    limit_conn lifekline_conn 64;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/x-javascript application/atom+xml application/rss+xml
        image/svg+xml font/woff2;

    # 共享 proxy 头与 keepalive 上游
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_pass_header Content-Security-Policy;
    proxy_pass_header X-Frame-Options;
    proxy_pass_header X-Content-Type-Options;
    proxy_pass_header Strict-Transport-Security;
    proxy_pass_header Referrer-Policy;
    proxy_pass_header Permissions-Policy;
    proxy_pass_header X-DNS-Prefetch-Control;

    # 默认 timeout（60s），长链路在各 location 单独覆盖
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # /health 不进上游
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    # v5-D85 (2026-05-24): 公开 SEO 页 micro-cache。
    # CF bot 风暴主要打这些路径，60s cache 吸收重复 prefetch。
    # 登录用户有 next-auth.session-token cookie，自动 bypass 缓存。
    location ~ ^/(knowledge|cases|tools|visual-assets|world-yi|community|insights|forum|docs|reports)(/|$) {
        proxy_pass http://lifekline_web_upstream;
        proxy_cache lifekline_cache;
        proxy_cache_key "$scheme$host$request_uri";
        proxy_cache_valid 200 301 302 60s;
        proxy_cache_valid 404 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        # 登录用户/POST 请求不命中缓存
        proxy_cache_bypass $cookie_next_auth_session_token $http_authorization;
        proxy_no_cache $cookie_next_auth_session_token $http_authorization;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js 静态构建产物：长缓存
    location /_next/static/ {
        proxy_pass http://lifekline_web_upstream;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    location /_next/image {
        proxy_pass http://lifekline_web_upstream;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # 站点静态资源
    location ~* ^/(favicon\.ico|robots\.txt|sitemap.*\.xml|manifest\.json)$ {
        proxy_pass http://lifekline_web_upstream;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # /api/analyze 与 /api/chat：流式 / LLM 长链路（最长 5min 容忍 + 关 buffering）
    location ~ ^/api/(analyze|chat)(/|$) {
        limit_req zone=lifekline_api burst=20 nodelay;
        proxy_pass http://lifekline_web_upstream;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    # admin cron / 长任务后台触发
    location ~ ^/api/admin/.*/(cron|trigger)$ {
        limit_req zone=lifekline_admin burst=5 nodelay;
        proxy_pass http://lifekline_admin_upstream;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # admin 页面 / API：限流稍紧
    location /admin/ {
        limit_req zone=lifekline_admin burst=20 nodelay;
        proxy_pass http://lifekline_admin_upstream;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /api/admin/ {
        limit_req zone=lifekline_admin burst=10 nodelay;
        proxy_pass http://lifekline_admin_upstream;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 一般 /api/* 路径
    location /api/ {
        limit_req zone=lifekline_api burst=40 nodelay;
        proxy_pass http://lifekline_web_upstream;
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # 兜底：所有其它路径
    location / {
        proxy_pass http://lifekline_web_upstream;
        # WebSocket / SSE upgrade 兼容
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_cache_bypass $http_upgrade;
    }
}
