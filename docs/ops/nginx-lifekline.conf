# v5-D52 (2026-05-20): 502 根因 + 性能治理
# - nginx proxy_*_timeout 默认 60s，遇 LLM 长链路（CHAT_LLM_TIMEOUT_MS=240000）必 502。
# - upstream keepalive 复用 TCP，降下游 TIME_WAIT 与握手开销。
# - 流式与 LLM 路径关掉 proxy_buffering，避免首字节延迟与 502。
# - HTTP/2、SSL session cache、扩 gzip 类型、加 Cache-Control 给静态资源。
# - 限流：保护 admin / api 不被刷。
# 备份文件：lifekline.conf.bak.<timestamp>

# 2026-06-15: 回到单 Next 实例拓扑。缓存、限流和长链路 timeout 留在 nginx，别用可选副本制造配置漂移。
upstream lifekline_upstream {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
    keepalive_requests 500;
    keepalive_timeout 60s;
}

# 限流区
limit_req_zone $binary_remote_addr zone=lifekline_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=lifekline_admin:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=lifekline_conn:10m;

# v5-D88 (2026-05-24): bot UA 识别 + 单独限流。
# Facebook meta-externalagent 单 IP 64% 流量 (1926/3000)，配合 SemrushBot/ClaudeBot/Amazonbot 共拖死 web 实例。
# 这类 crawler 对实时性无要求，10r/s 对全 bot 池足够，正经用户不受影响。
# v5-D89 (2026-05-24): 修正 — 早先用 $is_aggressive_bot$binary_remote_addr 拆桶失效（CF IP 池循环），
#   改用 $limit_bot_key（bot=AGG, 正常用户=空）让所有 bot 共享一个桶，2r/s 全局。
map $http_user_agent $limit_bot_key {
    default                                 "";
    "~*meta-externalagent"                  "AGG";
    "~*facebookexternalhit"                 "AGG";
    "~*SemrushBot"                          "AGG";
    "~*ClaudeBot"                           "AGG";
    "~*Amazonbot"                           "AGG";
    "~*GPTBot"                              "AGG";
    "~*PerplexityBot"                       "AGG";
    "~*Bytespider"                          "AGG";
    "~*AhrefsBot"                           "AGG";
    "~*MJ12bot"                             "AGG";
    "~*DotBot"                              "AGG";
    "~*PetalBot"                            "AGG";
    "~*YandexBot"                           "AGG";
    "~*DataForSeoBot"                       "AGG";
}
# 2026-06-04: 单 Next 实例被 bot 风暴打满；激进 bot 全局共享桶收紧到 1r/s。
# 2026-06-15: Amazonbot/GPTBot/ClaudeBot/SemrushBot 会用 source/_rsc 生成无限 URL 图，继续收紧。
# 正常用户 key 为空字符串走不上 limit。
limit_req_zone $limit_bot_key zone=lifekline_bot2:10m rate=30r/m;

# 2026-06-06: aggressive bot 会用 ?source= / ?from= 造无限唯一 URL，打穿 micro-cache。
# 只对 bot 忽略 query；正常用户保留 query，避免分页/搜索/工具参数串缓存。
map $limit_bot_key $lifekline_public_cache_args {
    default $args;
    "AGG" "";
}

# v5-D85 (2026-05-24): 公开 SEO 页 micro-cache。
# CF bot 风暴 90%+ 流量打 knowledge/cases/tools/visual-assets/world-yi，
# 这些都是 SSG/无登录态页，靠 nginx 缓存挡掉重复 SSR 即可。
# 60s TTL 足够吸收 prefetch 风暴；stale-while-revalidate 保命。
proxy_cache_path /var/cache/nginx/lifekline levels=1:2 keys_zone=lifekline_cache:50m
                 max_size=2g inactive=10m use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name www.life-kline.com life-kline.com;
    return 301 https://$host$request_uri;
}

# 本机内部后台入口：daemon/system-health 走同一 upstream，靠缓存/限流/timeout 控制成本。
server {
    listen 127.0.0.1:8080;
    server_name lifekline-internal;

    access_log off;
    client_max_body_size 12m;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;

    location = /health {
        default_type text/plain;
        return 200 "OK\n";
    }

    location / {
        proxy_pass http://lifekline_upstream;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.life-kline.com life-kline.com;

    ssl_certificate /etc/letsencrypt/live/www.life-kline.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.life-kline.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /var/log/nginx/lifekline-access.log;
    error_log /var/log/nginx/lifekline-error.log warn;

    # 上传体积限额
    client_max_body_size 12m;
    client_body_buffer_size 256k;
    client_header_timeout 30s;
    client_body_timeout 60s;
    send_timeout 60s;

    # 连接限额（防慢速 DoS）
    limit_conn lifekline_conn 64;

    # 2026-06-04: 单 Next 实例抗不住 crawler 风暴。激进 bot 1r/s + burst=5。
    # 触发上限的 bot 直接 429（cheap），不再消耗 web 实例 SSR 资源。
    limit_req zone=lifekline_bot2 burst=5 nodelay;
    limit_req_status 429;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/x-javascript application/atom+xml application/rss+xml
        image/svg+xml font/woff2;

    # 共享 proxy 头与 keepalive 上游
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_pass_header Content-Security-Policy;
    proxy_pass_header X-Frame-Options;
    proxy_pass_header X-Content-Type-Options;
    proxy_pass_header Strict-Transport-Security;
    proxy_pass_header Referrer-Policy;
    proxy_pass_header Permissions-Policy;
    proxy_pass_header X-DNS-Prefetch-Control;

    # 默认 timeout（60s），长链路在各 location 单独覆盖
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # /health 不进上游
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    # 公开页 micro-cache：SEO/报告/问答/事件页都允许匿名边缘缓存。
    # bot 会扫 source/_rsc/query 造无限 URL；bot cache key 去 query，登录用户/授权请求 bypass。
    location ~ ^/(knowledge|cases|tools|visual-assets|world-yi|community|insights|forum|docs|reports|result|r|questions|events|updates)(/|$) {
        # v5-D89 (2026-05-24): bot 限流必须在每个 location 显式声明，
        # nginx 行为：location 内 limit_req 完全覆盖 server 级别，不叠加。
        limit_req zone=lifekline_bot2 burst=5 nodelay;
        proxy_pass http://lifekline_upstream;
        proxy_cache lifekline_cache;
        proxy_cache_key "$scheme$host$uri?$lifekline_public_cache_args";
        proxy_cache_valid 200 301 302 10m;
        proxy_cache_valid 404 1m;
        # Next App Router 默认给动态页 no-store；公开 SEO 页匿名响应仍必须由边缘 micro-cache 抗 bot。
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        # 登录用户/POST 请求不命中缓存
        proxy_cache_bypass $cookie_next_auth_session_token $http_authorization;
        proxy_no_cache $cookie_next_auth_session_token $http_authorization;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js 静态构建产物
    # v5-D120 (2026-05-25): 防御性 — 直接透传 Next 自己的 Cache-Control。
    #   Next 对 200 已发 'public, max-age=31536000, immutable'，
    #   对 404 发 'no-store, must-revalidate'。
    #   过去 nginx 用 add_header always 强加 immutable，导致 404 也被 CF 缓存 1 年。
    #   修因事故：D119 build 后忘 reload，pm2 实例返回 404 + content-type:text/plain，
    #   被 CF 缓存 → 浏览器 strict MIME 拒渲染。
    location /_next/static/ {
        proxy_pass http://lifekline_upstream;
        access_log off;
        proxy_intercept_errors off;
        # 防御性：纵使 Next 哪天没发，nginx 也强制 4xx/5xx 不缓存。
        # 用 map 在 server 块外做不了 status-conditional add_header（nginx 限制），
        # 这里改用：完全不写 nginx 自己的 Cache-Control，让 Next 头原样透传。
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location /_next/image {
        proxy_pass http://lifekline_upstream;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # 站点静态资源
    location ~* ^/(favicon\.ico|robots\.txt|sitemap.*\.xml|manifest\.json)$ {
        proxy_pass http://lifekline_upstream;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # 测算页与 API 走主 upstream；激进 bot 直接丢弃。
    location = /analyze {
        if ($limit_bot_key != "") { return 204; }
        limit_req zone=lifekline_api burst=20 nodelay;
        proxy_pass http://lifekline_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # /api/analyze 与 /api/chat：流式 / LLM 长链路（最长 5min 容忍 + 关 buffering）
    location ~ ^/api/(analyze|chat)(/|$) {
        limit_req zone=lifekline_api burst=20 nodelay;
        proxy_pass http://lifekline_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    # admin cron / 长任务后台触发
    location ~ ^/api/admin/.*/(cron|trigger)$ {
        limit_req zone=lifekline_admin burst=5 nodelay;
        proxy_pass http://lifekline_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /admin/ {
        limit_req zone=lifekline_admin burst=20 nodelay;
        proxy_pass http://lifekline_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /api/admin/ {
        limit_req zone=lifekline_admin burst=10 nodelay;
        proxy_pass http://lifekline_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 一般 /api/* 路径
    location /api/ {
        limit_req zone=lifekline_api burst=40 nodelay;
        proxy_pass http://lifekline_upstream;
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # 首页：短 TTL 缓存（登录用户 bypass）
    location = / {
        limit_req zone=lifekline_bot2 burst=5 nodelay;
        proxy_pass http://lifekline_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_cache lifekline_cache;
        proxy_cache_key "$scheme$host$uri?$lifekline_public_cache_args";
        proxy_cache_valid 200 301 302 3m;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_bypass $cookie_next_auth_session_token $http_authorization;
        proxy_no_cache $cookie_next_auth_session_token $http_authorization;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 兜底：所有其它路径
    location / {
        # v5-D89: 兜底 location 同样需要显式挂 bot 限流
        limit_req zone=lifekline_bot2 burst=5 nodelay;
        proxy_pass http://lifekline_upstream;
        # WebSocket / SSE upgrade 兼容
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_cache_bypass $http_upgrade;
    }
}
